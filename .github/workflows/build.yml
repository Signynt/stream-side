name: Build Windows Receiver

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # --- КЭШ ДЛЯ VCPKG ---
      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            vcpkg
            ~/AppData/Local/vcpkg/archives
          key: ${{ runner.os }}-vcpkg-ffmpeg-${{ hashFiles('vcpkg/ports/ffmpeg/portfile.cmake') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-ffmpeg-

      # --- КЭШ ДЛЯ CARGO ---
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install vcpkg (if not cached)
        shell: bash
        run: |
          if [ ! -d "vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg.git
            ./vcpkg/bootstrap-vcpkg.bat
          fi

      - name: Install FFmpeg via vcpkg
        run: |
          ./vcpkg/vcpkg.exe install ffmpeg:x64-windows

      - name: Set FFmpeg Environment Variables
        shell: bash
        run: |
          VCPKG_ROOT=$(pwd)/vcpkg
          echo "FFMPEG_DIR=$VCPKG_ROOT/installed/x64-windows" >> $GITHUB_ENV
          # Добавляем путь к бинарникам в PATH, чтобы тесты или сборка их видели
          echo "$VCPKG_ROOT/installed/x64-windows/bin" >> $GITHUB_PATH

      - name: Build Receiver
        run: |
          cargo build --release --bin receiver

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: receiver-windows
          path: |
            target/release/receiver.exe
            vcpkg/installed/x64-windows/bin/*.dll